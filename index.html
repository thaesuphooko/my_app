<script>
// =============================================================
// ပထမဆုံး - ALL GLOBAL VARIABLES ကို window ပေါ်တင်ပါ
// =============================================================
window.allProducts = [];
window.cart = JSON.parse(localStorage.getItem('premiumCart') || '[]');
window.messages = [];
window.filteredProducts = [];
window.currentPageNum = 1;
const PAGE_SIZE = 20;

// =============================================================
// FIREBASE INIT
// =============================================================
const firebaseConfig = {
    apiKey: "AIzaSyDSu2XksfUZ6mAfktUpBqFtNxrgj96h1l4",
    authDomain: "app-my-caee3.firebaseapp.com",
    projectId: "app-my-caee3",
    storageBucket: "app-my-caee3.firebasestorage.app",
    messagingSenderId: "169669907659",
    appId: "1:169669907659:web:8fba75e7aed449e3ffb74e"
};

let db, auth, storage;
try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();
    storage = firebase.storage();
    window.db = db;
    window.auth = auth;
    window.storage = storage;
    console.log('✅ Firebase initialized');
} catch(e) {
    console.error('❌ Firebase error:', e);
}

// =============================================================
// ROUTING
// =============================================================
window.navigateTo = function(hash) {
    const pageId = hash.replace('#', '').split('/')[0] || 'home';
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById(`page-${pageId}`);
    if (target) target.classList.add('active');
    document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.toggle('active', item.dataset.hash === `#${pageId}`);
    });
    if (pageId === 'cart') window.updateCartUI();
    if (pageId === 'messages') window.renderMessages();
    window.location.hash = hash;
};

// Navigation clicks
document.querySelectorAll('.nav-item, .profile-menu-item[data-hash]').forEach(el => {
    el.addEventListener('click', () => {
        if (el.dataset.hash) window.navigateTo(el.dataset.hash);
    });
});

// =============================================================
// CART UI (Globally Exposed)
// =============================================================
window.updateCartUI = function() {
    const container = document.getElementById('cartItems');
    const summary = document.getElementById('cartSummary');
    const totalEl = document.getElementById('cartTotal');
    const badge = document.getElementById('cartBadge');
    const totalItems = window.cart.reduce((sum, i) => sum + (i.quantity || 0), 0);
    
    if (badge) {
        badge.textContent = totalItems;
        badge.style.display = totalItems > 0 ? 'inline' : 'none';
    }
    
    if (window.cart.length === 0) {
        if (container) container.innerHTML = `<div style="text-align:center;padding:30px;color:#888;"><i class="fas fa-cart-plus" style="font-size:36px;opacity:0.3;"></i><p>စျေးဝယ်တောင်း ဗလာဖြစ်နေသည်</p></div>`;
        if (summary) summary.style.display = 'none';
        return;
    }
    
    let html = '';
    let total = 0;
    window.cart.forEach(item => {
        const qty = item.quantity || 1;
        const subtotal = (item.price || 0) * qty;
        total += subtotal;
        html += `
            <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #eee;align-items:center;">
                <img src="${item.image || 'https://picsum.photos/seed/'+item.id+'/50/50'}" style="width:50px;height:50px;object-fit:cover;border-radius:8px;">
                <div style="flex:1;">
                    <div style="font-weight:600;font-size:14px;">${item.name || 'N/A'}</div>
                    <div style="color:#e11b1b;font-weight:700;">Ks ${Number(item.price).toLocaleString()}</div>
                    <div style="display:flex;gap:8px;align-items:center;margin-top:4px;">
                        <button onclick="window.updateQuantity('${item.id}', -1)" style="width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:transparent;cursor:pointer;">-</button>
                        <span>${qty}</span>
                        <button onclick="window.updateQuantity('${item.id}', 1)" style="width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:transparent;cursor:pointer;">+</button>
                    </div>
                </div>
                <div style="font-weight:700;">Ks ${subtotal.toLocaleString()}</div>
                <button onclick="window.removeFromCart('${item.id}')" style="background:none;border:none;color:#e11b1b;font-size:18px;cursor:pointer;">✕</button>
            </div>
        `;
    });
    if (container) container.innerHTML = html;
    if (summary) {
        summary.style.display = 'block';
        if (totalEl) totalEl.textContent = `Ks ${total.toLocaleString()}`;
    }
};

window.addToCartById = function(productId) {
    const product = window.allProducts.find(p => p.id === productId);
    if (!product) return;
    const existing = window.cart.find(item => item.id === productId);
    if (existing) existing.quantity += 1;
    else window.cart.push({ ...product, quantity: 1 });
    localStorage.setItem('premiumCart', JSON.stringify(window.cart));
    window.updateCartUI();
    window.showToast(`${product.name} ကို စျေးဝယ်တောင်းထဲ ထည့်လိုက်ပါပြီ။`);
};

window.removeFromCart = function(productId) {
    window.cart = window.cart.filter(item => item.id !== productId);
    localStorage.setItem('premiumCart', JSON.stringify(window.cart));
    window.updateCartUI();
};

window.updateQuantity = function(productId, delta) {
    const item = window.cart.find(p => p.id === productId);
    if (item) {
        item.quantity += delta;
        if (item.quantity <= 0) { window.removeFromCart(productId); return; }
        localStorage.setItem('premiumCart', JSON.stringify(window.cart));
        window.updateCartUI();
    }
};

// =============================================================
// PRODUCTS (Globally Exposed)
// =============================================================
window.renderProductGrid = function() {
    const grid = document.getElementById('productGrid');
    if (!grid) return;
    const start = 0;
    const end = window.currentPageNum * PAGE_SIZE;
    const items = window.filteredProducts.slice(start, end);
    
    if (items.length === 0 && window.currentPageNum === 1) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:#888;">ပစ္စည်းများ မရှိသေးပါ</div>`;
        document.getElementById('loadMoreBtn').style.display = 'none';
        return;
    }
    
    let html = '';
    items.forEach(p => {
        html += `
            <div class="product-item" onclick="window.addToCartById('${p.id}')">
                <img src="${p.image || 'https://picsum.photos/seed/'+p.id+'/300/300'}" alt="${p.name}" loading="lazy">
                <div class="product-name">${p.name || 'N/A'}</div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <span style="text-decoration:line-through;font-size:12px;color:#888;">Ks ${Number(p.originalPrice || p.price * 1.2).toLocaleString()}</span>
                    <span class="product-price">Ks ${Number(p.price).toLocaleString()}</span>
                </div>
                <div style="font-size:12px;color:#888;">⭐ ${p.rating || 0} (${p.reviews || 0})</div>
                <button onclick="event.stopPropagation();window.addToCartById('${p.id}')" style="width:100%;padding:6px;background:#ff6b00;color:#fff;border:none;border-radius:20px;margin-top:6px;cursor:pointer;font-weight:600;">Add to Cart</button>
            </div>
        `;
    });
    grid.innerHTML = html;
    document.getElementById('loadMoreBtn').style.display = (end < window.filteredProducts.length) ? 'block' : 'none';
};

window.loadProducts = function() {
    if (!db) {
        console.error('❌ Firestore not initialized');
        return;
    }
    console.log('📦 Loading products...');
    db.collection('products')
        .get()
        .then((snapshot) => {
            const products = [];
            snapshot.forEach(doc => {
                products.push({ id: doc.id, ...doc.data() });
            });
            window.allProducts = products;
            window.filteredProducts = [...products];
            window.currentPageNum = 1;
            window.renderProductGrid();
            console.log(`✅ Products loaded: ${products.length}`);
        })
        .catch((err) => {
            console.warn('⚠️ Firestore error:', err.message);
            document.getElementById('productGrid').innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:40px;color:#dc2626;">
                    <i class="fas fa-exclamation-circle" style="font-size:28px;"></i>
                    <p>ဒေတာများ ဖွင့်ရာတွင် အမှားရှိသည်။</p>
                    <p style="font-size:12px;color:#888;">${err.message}</p>
                    <button onclick="window.loadProducts()" style="margin-top:12px;padding:8px 24px;background:#e11b1b;color:#fff;border:none;border-radius:20px;cursor:pointer;">ပြန်ကြိုးစားမည်</button>
                </div>
            `;
        });
};

// Category filter
document.querySelectorAll('.category-chip').forEach(chip => {
    chip.addEventListener('click', function() {
        document.querySelectorAll('.category-chip').forEach(c => {
            c.style.background = '#eee';
            c.style.color = '#333';
        });
        this.style.background = '#e11b1b';
        this.style.color = '#fff';
        const cat = this.dataset.cat;
        window.filteredProducts = cat === 'all' ? [...window.allProducts] : window.allProducts.filter(p => p.category === cat);
        window.currentPageNum = 1;
        window.renderProductGrid();
    });
});

// Load more
document.getElementById('loadMoreBtn').addEventListener('click', function() {
    window.currentPageNum++;
    window.renderProductGrid();
});

// =============================================================
// MESSAGES (Globally Exposed)
// =============================================================
window.renderMessages = function() {
    const container = document.getElementById('messageList');
    if (!container) return;
    if (window.messages.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:30px;color:#888;"><i class="fas fa-inbox" style="font-size:36px;opacity:0.3;"></i><p>စာများ မရှိသေးပါ</p></div>`;
        return;
    }
    let html = '';
    window.messages.forEach(msg => {
        const align = msg.isUser ? 'right' : 'left';
        const bg = msg.isUser ? '#e11b1b' : '#eee';
        const color = msg.isUser ? '#fff' : '#333';
        html += `
            <div style="text-align:${align};margin-bottom:6px;">
                <span style="display:inline-block;padding:8px 14px;border-radius:12px;background:${bg};color:${color};max-width:80%;">
                    ${msg.text}
                    <div style="font-size:10px;opacity:0.7;margin-top:2px;">${msg.time || ''}</div>
                </span>
            </div>
        `;
    });
    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
};

// Send message
document.getElementById('msgSendBtn').addEventListener('click', function() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    if (!db) { window.showToast('Firebase ချိတ်ဆက်မှု မရှိပါ။'); return; }
    const userId = auth.currentUser ? auth.currentUser.uid : 'guest';
    db.collection('messages').add({
        text: text,
        time: new Date().toLocaleTimeString(),
        userId: userId,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        isUser: true
    }).then(() => {
        input.value = '';
        setTimeout(() => {
            const replies = ['မင်္ဂလာပါ! ဘာကူညီရမလဲ?', 'ကျေးဇူးပါ။ ပြန်လည်ဆက်သွယ်ပါမယ်။', 'အော်ဒါအခြေအနေ စစ်ဆေးပေးပါ့မယ်။'];
            db.collection('messages').add({
                text: replies[Math.floor(Math.random() * replies.length)],
                time: new Date().toLocaleTimeString(),
                userId: 'bot',
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                isUser: false
            });
        }, 1500);
    }).catch(err => {
        console.error('Send message error:', err);
        window.showToast('စာပို့ရာတွင် အမှားရှိသည်။');
    });
});

document.getElementById('msgInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') document.getElementById('msgSendBtn').click();
});

// Listen to messages
function listenMessages() {
    if (!db) return;
    db.collection('messages')
        .orderBy('timestamp', 'asc')
        .limit(100)
        .onSnapshot((snapshot) => {
            window.messages = [];
            snapshot.forEach(doc => {
                window.messages.push({ id: doc.id, ...doc.data() });
            });
            window.renderMessages();
        }, (err) => {
            console.error('Message listener error:', err);
        });
}

// =============================================================
// TOAST
// =============================================================
window.showToast = function(message) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const div = document.createElement('div');
    div.className = 'toast';
    div.textContent = message;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
};

// =============================================================
// CHECKOUT
// =============================================================
document.getElementById('checkoutBtn').addEventListener('click', function() {
    if (window.cart.length === 0) {
        window.showToast('စျေးဝယ်တောင်းထဲ ပစ္စည်းမရှိပါ။');
        return;
    }
    window.navigateTo('#checkout-address');
});

document.getElementById('checkoutForm1').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('chkName').value.trim();
    const phone = document.getElementById('chkPhone').value.trim();
    const address = document.getElementById('chkAddress').value.trim();
    if (!name || !phone || !address) {
        window.showToast('ကျေးဇူးပြုပြီး အချက်အလက်အားလုံးကို ဖြည့်သွင်းပါ။');
        return;
    }
    sessionStorage.setItem('checkoutName', name);
    sessionStorage.setItem('checkoutPhone', phone);
    sessionStorage.setItem('checkoutAddress', address);
    window.navigateTo('#checkout-payment');
});

let countdownSeconds = 3600;
let countdownInterval = null;

document.getElementById('paidBtn').addEventListener('click', function() {
    if (countdownInterval) clearInterval(countdownInterval);
    window.showToast('✅ ငွေလွှဲပြီးပါပြီ။');
    window.cart = [];
    localStorage.setItem('premiumCart', JSON.stringify(window.cart));
    window.updateCartUI();
    window.navigateTo('#success');

document.getElementById('copyWaveBtn').addEventListener('click', function() {
    navigator.clipboard?.writeText('Thae Su Phuo Ko - 09 781 145 573')

document.getElementById('backHomeBtn').addEventListener('click', function() {
    window.navigateTo('#home');

// PROFILE
// =============================================================
document.getElementById('logoutBtn').addEventListener('click', function() {
    if (confirm('အကောင့်မှ ထွက်မည် သေချာပါသလား?')) {
        localStorage.removeItem('premiumCart');

// =============================================================
// CHAT FAB
// =============================================================
document.getElementById('chatFab').addEventListener('click', function() {
    window.navigateTo('#messages');
});

// =============================================================
// AUTH
// =============================================================
if (auth) {
    auth.onAuthStateChanged((user) => {
        if (user) {
            console.log('✅ Auth: User logged in', user.uid);
            document.getElementById('profileName').textContent = user.displayName || 'ဝယ်သူ';
            document.getElementById('profilePhone').textContent = user.phoneNumber || '09-XXX-XXX-XXX';
        } else {
            auth.signInAnonymously().catch(err => console.warn('Anonymous sign-in error:', err));
        }
    });
}

// =============================================================
// SMART CLOCK
// =============================================================
let clockStart = Date.now();
let isSlowMode = false;
let slowModeMultiplier = 6;

function updateClock() {
    const el = document.getElementById('smartClock');
    if (!el) return;
    const elapsed = (Date.now() - clockStart) / 1000;
    const totalSec = isSlowMode ? (elapsed / slowModeMultiplier) : elapsed;
    const hours = Math.floor(totalSec / 3600) % 24;
    const mins = Math.floor((totalSec % 3600) / 60);
    const secs = Math.floor(totalSec % 60);
    el.textContent = `${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    if (elapsed >= 60 && !isSlowMode) {
        isSlowMode = true;
        el.style.color = '#ff6b00';
    }
}
setInterval(updateClock, 1000);
updateClock();

// =============================================================
// THEME TOGGLE
// =============================================================
document.getElementById('themeToggle').addEventListener('click', function() {
    const isDark = document.documentElement.style.backgroundColor === '#1a1a2e';
    document.documentElement.style.backgroundColor = isDark ? '#f5f5f5' : '#1a1a2e';
    document.documentElement.style.color = isDark ? '#333' : '#eee';
    this.textContent = isDark ? '🌙' : '☀️';
});

// =============================================================
// INIT
// =============================================================
function init() {
    console.log('🚀 Initializing app...');
    window.loadProducts();
    window.updateCartUI();
    listenMessages();
    const hash = window.location.hash || '#home';
    window.navigateTo(hash);
    console.log('✅ App initialized.');
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
