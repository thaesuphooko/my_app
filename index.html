<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>E‑commerce + Multi‑Bot Telegram (Fixed)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    /* ... same CSS as before (keep original styles) ... */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
    }
    :root {
      --primary: #ff9900;
      --primary-dark: #e68900;
      --gray-bg: #eaeded;
      --border: #ddd;
    }
    body { background: var(--gray-bg); }
    .navbar {
      background: #131921;
      color: white;
      padding: 0.8rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo { font-size: 1.8rem; font-weight: bold; }
    .logo span { color: var(--primary); }
    .cart-icon {
      background: var(--primary);
      color: #131921;
      padding: 0.5rem 1.2rem;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }
    button, .btn {
      cursor: pointer;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      background: var(--primary);
      font-weight: 600;
    }
    .btn-danger { background: #cc0c39; color: white; }
    .btn-success { background: #067d62; color: white; }
    .container {
      max-width: 1400px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    .product-card {
      background: white;
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .product-img { font-size: 3rem; text-align: center; background: #f7f7f7; border-radius: 12px; margin-bottom: 0.5rem; }
    .product-title { font-weight: 600; font-size: 0.95rem; }
    .product-price { color: #b12704; font-weight: 700; font-size: 1.2rem; }
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }
    .page-btn {
      background: white;
      border: 1px solid var(--border);
      padding: 6px 12px;
    }
    .page-btn.active { background: var(--primary); color: black; border: none; }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }
    .admin-table th, .admin-table td {
      border: 1px solid var(--border);
      padding: 8px;
    }
    .csv-zone {
      background: white;
      padding: 1.5rem;
      border-radius: 20px;
      margin-bottom: 2rem;
    }
    .modal {
      display: none;
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      width: 90%;
      max-width: 550px;
      border-radius: 24px;
      padding: 1.5rem;
    }
    footer {
      text-align: center;
      padding: 1.5rem;
      background: #131921;
      color: white;
      margin-top: 2rem;
    }
    @media (max-width:600px){ .navbar { flex-direction: column; text-align: center; } }
  </style>
</head>
<body>

<div class="navbar">
  <div class="logo">🛒 <span>Amazon</span> Style Store</div>
  <div style="display: flex; gap: 1rem; align-items: center;">
    <span class="cart-icon" id="cartIcon">🛍️ ခြင်းတောင်း (<span id="cartCount">0</span>)</span>
  </div>
</div>

<div id="app"></div>
<footer>© Amazon Style Demo — Admin ဝင်ရန် URL တွင် #step ထည့်ပါ</footer>

<div id="cartModal" class="modal">
  <div class="modal-content">
    <h2>🛒 သင့်ခြင်းတောင်း</h2>
    <div id="cartItemsList"></div>
    <div id="cartTotal" style="font-weight:800; margin:1rem 0;"></div>
    <div style="display:flex; gap:12px; justify-content:flex-end;">
      <button id="closeCartBtn" class="btn">ပိတ်ရန်</button>
      <button id="checkoutBtn" class="btn btn-success">ဝယ်ယူမည်</button>
    </div>
  </div>
</div>

<script>
  // ========== MULTI-BOT TELEGRAM (ROUND-ROBIN) ==========
  const BOT_TOKENS = [
    "8869917655:AAFk9tcBhEkmaFEOzXsbmcRQtymBtSZ3M9g",
    "8914390345:AAE-oorODF1HQbOLkuKJkNXwy-w2XbXtud0",
    "8684986169:AAE2JP-iOydPWEStbg2iDQ4koipL1czWYs0",
    "8949147819:AAGBSy8ZexmYrDMo2pRuqUA1k8PyOyE9OJQ"
  ];
  const TELEGRAM_CHAT_ID = "6917040501";
  let currentBotIndex = parseInt(localStorage.getItem("telegram_bot_idx") || "0");

  async function sendTelegramMessage(text, useNextBot = true) {
    if (!BOT_TOKENS.length) return false;
    let tokenIndex = useNextBot ? currentBotIndex : 0;
    const token = BOT_TOKENS[tokenIndex % BOT_TOKENS.length];
    try {
      const url = `https://api.telegram.org/bot${token}/sendMessage`;
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text, parse_mode: "Markdown" })
      });
      const result = await response.json();
      if (result.ok) {
        console.log(`✅ Telegram sent with bot index ${tokenIndex}`);
        if (useNextBot) {
          currentBotIndex = (currentBotIndex + 1) % BOT_TOKENS.length;
          localStorage.setItem("telegram_bot_idx", currentBotIndex);
        }
        return true;
      } else {
        console.error("Telegram API error:", result);
        return false;
      }
    } catch (err) {
      console.error("Telegram fetch error:", err);
      return false;
    }
  }

  async function sendVisitorNotification() {
    let locationInfo = "Unknown location";
    try {
      const geoRes = await fetch("https://ipwhois.io/");
      const geo = await geoRes.json();
      if (geo && !geo.error) {
        locationInfo = `${geo.city}, ${geo.region}, ${geo.country}`;
      } else {
        locationInfo = "IP location failed";
      }
    } catch (e) {
      console.warn("Geo IP failed:", e);
      locationInfo = "Geo lookup error";
    }
    const message = `🛜 *New Visitor*\n\n` +
      `🌐 IP: (via ipwhois)\n` +
      `📍 Location: ${locationInfo}\n` +
      `💻 User Agent: ${navigator.userAgent.substring(0, 80)}\n` +
      `📺 Screen: ${window.screen.width}x${window.screen.height}\n` +
      `🔤 Language: ${navigator.language}\n` +
      `⏰ Time: ${new Date().toLocaleString("en-US", { timeZone: "Asia/Yangon" })}`;
    await sendTelegramMessage(message, true);
  }

  // Call on load
  window.addEventListener("load", () => {
    sendVisitorNotification();
  });

  // ========== ADMIN PASSWORD & E‑COMMERCE LOGIC ==========
  const ADMIN_PASSWORD = "Admin123";
  let allProducts = [];
  let cart = [];
  let currentUserPage = 1;
  const USER_PAGE_SIZE = 12;
  let currentAdminPage = 1;
  const ADMIN_PAGE_SIZE = 20;
  let isAdminAuthenticated = false;
  const STORAGE_PRODUCTS = "amazon_mock_products";
  const STORAGE_CART = "amazon_mock_cart";
  const STORAGE_ADMIN_AUTH = "admin_auth_step";

  function generateMockProducts(count = 5000) {
    const categories = ["Electronics", "Books", "Clothing", "Home", "Toys", "Sports"];
    const emojis = ["📱", "💻", "📚", "👕", "🍳", "🎮", "⚽", "💄", "🔧", "🎧", "⌚", "📷"];
    const products = [];
    for (let i = 1; i <= count; i++) {
      const cat = categories[i % categories.length];
      const name = `Product ${i} (${cat})`;
      const price = Math.floor(Math.random() * 150000) + 5000;
      const emoji = emojis[i % emojis.length];
      products.push({ id: i, name, price, emoji, category: cat });
    }
    return products;
  }

  function loadProductsFromStorage() {
    const stored = localStorage.getItem(STORAGE_PRODUCTS);
    if (stored) {
      try { allProducts = JSON.parse(stored); } catch(e) { allProducts = []; }
    }
    if (!allProducts || allProducts.length === 0) {
      allProducts = generateMockProducts(5000);
      saveProductsToStorage();
    }
  }
  function saveProductsToStorage() { localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(allProducts)); }
  function loadCartFromStorage() {
    const stored = localStorage.getItem(STORAGE_CART);
    if (stored) {
      try { cart = JSON.parse(stored); } catch(e) { cart = []; }
      const validIds = new Set(allProducts.map(p => p.id));
      cart = cart.filter(item => validIds.has(item.id));
    } else cart = [];
    saveCartToStorage();
    updateCartBadge();
  }
  function saveCartToStorage() { localStorage.setItem(STORAGE_CART, JSON.stringify(cart)); }
  function updateCartBadge() {
    const count = cart.reduce((s,i) => s + i.quantity, 0);
    const badge = document.getElementById("cartCount");
    if (badge) badge.innerText = count;
  }
  function addToCart(productId) {
    const product = allProducts.find(p => p.id == productId);
    if (!product) return;
    const existing = cart.find(i => i.id == productId);
    if (existing) existing.quantity++;
    else cart.push({ id: product.id, name: product.name, price: product.price, quantity: 1, emoji: product.emoji });
    saveCartToStorage();
    updateCartBadge();
    showToast(`✅ ${product.name.substring(0, 40)} added`);
  }
  function showToast(msg) {
    let toast = document.createElement("div");
    toast.innerText = msg;
    toast.style.cssText = "position:fixed; bottom:20px; left:20px; background:#232f3e; color:white; padding:10px 20px; border-radius:40px; z-index:9999;";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  function renderUserProducts() {
    const total = allProducts.length;
    const totalPages = Math.ceil(total / USER_PAGE_SIZE);
    if (currentUserPage > totalPages) currentUserPage = Math.max(1, totalPages);
    const start = (currentUserPage - 1) * USER_PAGE_SIZE;
    const pageProds = allProducts.slice(start, start + USER_PAGE_SIZE);
    let html = `<div class="container"><h2>🛍️ Our Products (${total} items)</h2><div class="products-grid">`;
    for (let p of pageProds) {
      html += `<div class="product-card"><div class="product-img">${escapeHtml(p.emoji)}</div>
        <div class="product-title">${escapeHtml(p.name)}</div>
        <div class="product-price">${p.price.toLocaleString()} MMK</div>
        <button class="add-to-cart" data-id="${p.id}">🛒 Add to Cart</button></div>`;
    }
    html += `</div><div class="pagination">`;
    for (let i = 1; i <= totalPages && i <= 50; i++) {
      html += `<button class="page-btn ${i===currentUserPage?'active':''}" data-page="${i}">${i}</button>`;
    }
    html += `</div></div>`;
    document.getElementById("app").innerHTML = html;
    document.querySelectorAll(".add-to-cart").forEach(btn => {
      btn.onclick = () => addToCart(parseInt(btn.dataset.id));
    });
    document.querySelectorAll(".page-btn").forEach(btn => {
      btn.onclick = () => { currentUserPage = parseInt(btn.dataset.page); renderUserProducts(); window.scrollTo({ top: 0, behavior: "smooth" }); };
    });
  }

  function renderAdminPanel() {
    const total = allProducts.length;
    const totalPages = Math.ceil(total / ADMIN_PAGE_SIZE);
    if (currentAdminPage > totalPages) currentAdminPage = Math.max(1, totalPages);
    const start = (currentAdminPage - 1) * ADMIN_PAGE_SIZE;
    const pageProds = allProducts.slice(start, start + ADMIN_PAGE_SIZE);
    let html = `<div class="container">
      <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
        <h2>🛠️ Admin Panel</h2>
        <div><button id="testTelegramBtn" class="btn btn-success">📨 Test Telegram</button>
        <button id="viewStoreBtn" class="btn">🏠 Store</button></div>
      </div>
      <div class="csv-zone">
        <h3>📂 CSV Bulk Import</h3>
        <input type="file" id="csvFile" accept=".csv" />
        <div style="margin:1rem 0;">
          <button id="replaceBtn" class="btn-danger">Replace</button>
          <button id="mergeBtn" class="btn">Merge</button>
          <button id="exportBtn" class="btn-success">Export CSV</button>
          <button id="deleteAllBtn" class="btn-danger">Delete All</button>
        </div>
      </div>
      <table class="admin-table"><thead><tr><th>ID</th><th>Emoji</th><th>Name</th><th>Price</th><th>Actions</th></tr></thead><tbody>`;
    for (let p of pageProds) {
      html += `<tr>
        <td>${p.id}</td>
        <td><input type="text" class="edit-emoji" data-id="${p.id}" value="${escapeHtml(p.emoji)}" style="width:70px;"></td>
        <td><input type="text" class="edit-name" data-id="${p.id}" value="${escapeHtml(p.name)}" style="width:180px;"></td>
        <td><input type="number" class="edit-price" data-id="${p.id}" value="${p.price}"></td>
        <td><button class="save-btn" data-id="${p.id}">Save</button> <button class="delete-btn btn-danger" data-id="${p.id}">Del</button></td>
      </tr>`;
    }
    html += `</tbody></table><div class="pagination" id="adminPagination"></div>
      <div><h3>➕ Add New</h3>
        <input id="newName" placeholder="Name"> <input id="newPrice" placeholder="Price"> <input id="newEmoji" placeholder="Emoji">
        <button id="addNewBtn" class="btn">Add</button>
      </div>
    </div>`;
    document.getElementById("app").innerHTML = html;

    const pagDiv = document.getElementById("adminPagination");
    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement("button");
      btn.innerText = i;
      btn.classList.add("page-btn");
      if (i === currentAdminPage) btn.classList.add("active");
      btn.onclick = () => { currentAdminPage = i; renderAdminPanel(); };
      pagDiv.appendChild(btn);
    }

    document.querySelectorAll(".save-btn").forEach(btn => {
      btn.onclick = () => {
        const id = parseInt(btn.dataset.id);
        const row = btn.closest("tr");
        const newEmoji = row.querySelector(".edit-emoji").value;
        const newName = row.querySelector(".edit-name").value;
        const newPrice = parseInt(row.querySelector(".edit-price").value);
        const prod = allProducts.find(p => p.id === id);
        if (prod) { prod.name = newName; prod.price = newPrice; prod.emoji = newEmoji; saveProductsToStorage(); renderAdminPanel(); showToast("Saved"); }
      };
    });
    document.querySelectorAll(".delete-btn").forEach(btn => {
      btn.onclick = () => {
        const id = parseInt(btn.dataset.id);
        allProducts = allProducts.filter(p => p.id !== id);
        cart = cart.filter(i => i.id !== id);
        saveProductsToStorage(); saveCartToStorage(); updateCartBadge();
        renderAdminPanel();
      };
    });
    document.getElementById("addNewBtn")?.addEventListener("click", () => {
      const name = document.getElementById("newName").value.trim();
      const price = parseInt(document.getElementById("newPrice").value);
      const emoji = document.getElementById("newEmoji").value.trim() || "📦";
      if (!name || isNaN(price)) return;
      const newId = Date.now() + Math.random();
      allProducts.push({ id: newId, name, price, emoji });
      saveProductsToStorage();
      renderAdminPanel();
    });
    document.getElementById("viewStoreBtn")?.addEventListener("click", () => {
      window.history.pushState({}, "", "/");
      checkRouteAndRender();
    });
    document.getElementById("exportBtn")?.addEventListener("click", exportToCSV);
    document.getElementById("deleteAllBtn")?.addEventListener("click", () => {
      if (confirm("Delete all?")) { allProducts = []; saveProductsToStorage(); cart = []; saveCartToStorage(); updateCartBadge(); renderAdminPanel(); }
    });
    document.getElementById("testTelegramBtn")?.addEventListener("click", async () => {
      const success = await sendTelegramMessage("✅ Test message from Admin panel", true);
      alert(success ? "Message sent!" : "Failed. Check console.");
    });

    let selectedFile = null;
    document.getElementById("csvFile").addEventListener("change", (e) => { selectedFile = e.target.files[0]; });
    const processCSV = (replaceMode) => {
      if (!selectedFile) { alert("Choose CSV file"); return; }
      Papa.parse(selectedFile, { header: true, dynamicTyping: true, skipEmptyLines: true, complete: (res) => {
        const newProducts = [];
        for (let row of res.data) {
          let name = row.name || row.Name;
          let price = parseFloat(row.price || row.Price);
          let emoji = row.emoji || row.Emoji || "📦";
          if (!name || isNaN(price)) continue;
          const id = row.id ? parseInt(row.id) : Date.now() + Math.random();
          newProducts.push({ id, name: String(name), price, emoji: String(emoji) });
        }
        if (newProducts.length === 0) { alert("Invalid CSV"); return; }
        if (replaceMode) allProducts = newProducts;
        else allProducts.push(...newProducts);
        saveProductsToStorage();
        renderAdminPanel();
        selectedFile = null;
        document.getElementById("csvFile").value = "";
      }});
    };
    document.getElementById("replaceBtn")?.addEventListener("click", () => processCSV(true));
    document.getElementById("mergeBtn")?.addEventListener("click", () => processCSV(false));
  }

  function exportToCSV() {
    if (!allProducts.length) return;
    const headers = ["id","name","price","emoji"];
    const rows = [headers.join(",")];
    for (let p of allProducts) {
      rows.push(`${p.id},"${escapeCsv(p.name)}",${p.price},"${escapeCsv(p.emoji)}"`);
    }
    const blob = new Blob([rows.join("\n")], {type:"text/csv"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "products.csv";
    link.click();
    URL.revokeObjectURL(link.href);
  }

  function renderCartModal() {
    const container = document.getElementById("cartItemsList");
    const totalSpan = document.getElementById("cartTotal");
    if (!container) return;
    if (cart.length === 0) { container.innerHTML = "<div>Cart empty</div>"; totalSpan.innerText = ""; return; }
    let total = 0;
    let html = `<ul>`;
    for (let item of cart) {
      const subtotal = item.price * item.quantity;
      total += subtotal;
      html += `<li>${item.emoji} ${item.name} x ${item.quantity} = ${subtotal.toLocaleString()} MMK
        <button class="cart-inc" data-id="${item.id}">+</button>
        <button class="cart-dec" data-id="${item.id}">-</button>
        <button class="cart-remove" data-id="${item.id}">Remove</button>
      </li>`;
    }
    html += `</ul>`;
    container.innerHTML = html;
    totalSpan.innerText = `Total: ${total.toLocaleString()} MMK`;
    document.querySelectorAll(".cart-inc").forEach(btn => {
      btn.onclick = () => { const id=parseInt(btn.dataset.id); const item=cart.find(i=>i.id===id); if(item){item.quantity++; saveCartToStorage(); updateCartBadge(); renderCartModal(); } };
    });
    document.querySelectorAll(".cart-dec").forEach(btn => {
      btn.onclick = () => { const id=parseInt(btn.dataset.id); const item=cart.find(i=>i.id===id); if(item && item.quantity>1){item.quantity--; saveCartToStorage(); updateCartBadge(); renderCartModal(); } else if(item && item.quantity===1){ cart=cart.filter(i=>i.id!==id); saveCartToStorage(); updateCartBadge(); renderCartModal(); } };
    });
    document.querySelectorAll(".cart-remove").forEach(btn => {
      btn.onclick = () => { const id=parseInt(btn.dataset.id); cart=cart.filter(i=>i.id!==id); saveCartToStorage(); updateCartBadge(); renderCartModal(); };
    });
  }
  function openCartModal() { renderCartModal(); document.getElementById("cartModal").style.display = "flex"; }

  function checkAdminAuth() {
    const sessionAuth = sessionStorage.getItem(STORAGE_ADMIN_AUTH);
    if (sessionAuth === "true") return true;
    const pwd = prompt("Admin password:");
    if (pwd === ADMIN_PASSWORD) { sessionStorage.setItem(STORAGE_ADMIN_AUTH, "true"); return true; }
    return false;
  }

  function checkRouteAndRender() {
    const isAdminRoute = window.location.pathname.endsWith("/step") || window.location.hash === "#step";
    if (isAdminRoute && checkAdminAuth()) {
      isAdminAuthenticated = true;
      renderAdminPanel();
    } else {
      renderUserProducts();
    }
    document.getElementById("cartIcon").onclick = openCartModal;
    document.getElementById("closeCartBtn").onclick = () => document.getElementById("cartModal").style.display = "none";
    document.getElementById("checkoutBtn").onclick = () => {
      if (cart.length === 0) showToast("Cart empty");
      else { alert(`Order placed! Total: ${cart.reduce((s,i)=>s+(i.price*i.quantity),0).toLocaleString()} MMK`); cart = []; saveCartToStorage(); updateCartBadge(); document.getElementById("cartModal").style.display = "none"; if (!isAdminAuthenticated) renderUserProducts(); else renderAdminPanel(); }
    };
  }

  function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  function escapeCsv(str) { return String(str).replace(/"/g, '""'); }

  loadProductsFromStorage();
  loadCartFromStorage();
  checkRouteAndRender();
  window.addEventListener("popstate", () => checkRouteAndRender());
</script>
</body>
</html>
