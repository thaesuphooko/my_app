<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title id="pageTitle">Shop.com.mm</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>

            apiKey: "AIzaSyDSu2XksfUZ6mAfktUpBqFtNxrgj96h1l4",
            authDomain: "app-my-caee3.firebaseapp.com",
            projectId: "app-my-caee3",
            storageBucket: "app-my-caee3.firebasestorage.app",
            messagingSenderId: "169669907659",
            appId: "1:169669907659:web:8fba75e7aed449e3ffb74e",
            measurementId: "G-RTM9J8L6R1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        console.log("✅ Firebase connected!");

    <link rel="stylesheet" href="style.css">
    <style>
        .reviews-section .comment { background: #f8f9fa; padding: 0.4rem 0.7rem; border-radius: 10px; margin-bottom: 0.3rem; font-size: 0.8rem; }
        .reviews-section .comment strong { color: #e11b1b; }
        .reviews-section textarea { width: 100%; padding: 0.3rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.85rem; }
        .chat-msg .sender { font-weight: 700; color: #e11b1b; }
        .chat-msg .time { font-size: 0.6rem; color: #888; }
        .profile-btn-group { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.8rem; }
        .profile-btn-group .btn { width: 100%; justify-content: center; }
        /* Hide the user badge in header since we have bottom nav */
        .user-badge { display: none; }
        /* Cart icon in header - keep but also bottom nav */
        .cart-icon { display: none; }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header" id="mainHeader">
        <div class="logo" id="logoHome">🛒 <span id="storeNameDisplay">Shop</span>.com.mm</div>
        <div class="header-actions">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="ရှာမည်..." />
                <button id="searchBtn">🔍</button>
            </div>
            <span class="user-badge" id="userBadge">👤 Login</span>
        </div>
    </header>

    <!-- ===== CATEGORIES ===== -->
    <div class="categories-bar" id="categoriesBar">
        <a data-cat="all">အားလုံး</a>
        <a data-cat="Amazon">🛒 Amazon</a>
        <a data-cat="GoogleSheet">📊 Google Sheet</a>
        <a data-cat="TikTok">🎵 TikTok</a>
        <a data-cat="YouTube">▶️ YouTube</a>
    </div>

    <!-- ========================================================== -->
    <!-- ===== PAGE CONTAINERS ===== -->
    <!-- ========================================================== -->
    <div id="app">
        <!-- ===== HOME PAGE (Default) ===== -->
        <div id="page-home" class="page-container active">
            <div id="homeContent">
                <!-- Products will be rendered here by user.js -->
            </div>
        </div>

        <!-- ===== PROFILE PAGE ===== -->
        <div id="page-profile" class="page-container">
            <div class="page-header">
                <button class="back-btn" onclick="navigateTo('home')">←</button>
                <h2>👤 My Profile</h2>
            </div>
            <div id="profileContent">
                <!-- Profile content rendered by user.js -->
            </div>
        </div>

        <!-- ===== ORDERS PAGE ===== -->
        <div id="page-orders" class="page-container">
            <div class="page-header">
                <button class="back-btn" onclick="navigateTo('profile')">←</button>
                <h2>📦 My Orders</h2>
            </div>
            <input type="text" class="order-search" id="orderSearch" placeholder="🔍 Search orders..." />
            <div id="ordersContent">
                <!-- Orders rendered by user.js -->
            </div>
        </div>

        <!-- ===== TRACKING PAGE ===== -->
        <div id="page-tracking" class="page-container">
            <div class="page-header">
                <button class="back-btn" onclick="navigateTo('orders')">←</button>
                <h2>🚚 Order Tracking</h2>
            </div>
            <div id="trackingContent">
                <!-- Tracking content rendered by user.js -->
            </div>
        </div>
    </div>

    <!-- ========================================================== -->
    <!-- ===== MODALS ===== -->
    <!-- ========================================================== -->

    <!-- ===== CART MODAL ===== -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <h2>🛒 ခြင်းတောင်း</h2>
            <div id="cartItemsList"></div>
            <div id="cartTotal" class="cart-total"></div>
            <div style="display:flex; gap:0.5rem; justify-content:flex-end; margin-top:0.8rem; flex-wrap:wrap;">
                <button class="btn btn-outline" id="closeCartBtn">ပိတ်ရန်</button>
                <button class="btn btn-success" id="checkoutBtn">ဝယ်ယူမည်</button>
            </div>
        </div>
    </div>

    <!-- ===== CHECKOUT MODAL ===== -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content" id="checkoutContent">
            <h2>📦 ဝယ်ယူမှု</h2>
            <div id="checkoutFormContainer">
                <form id="checkoutForm" class="checkout-form">
                    <label id="labelName">အမည်</label>
                    <input type="text" id="custName" placeholder="သင့်အမည်" required />
                    <label id="labelPhone">ဖုန်းနံပါတ်</label>
                    <input type="text" id="custPhone" placeholder="09xxxxxxxx" required />
                    <label id="labelAddress">လိပ်စာ</label>
                    <textarea id="custAddress" placeholder="ပို့ဆောင်မည့်လိပ်စာ" rows="2" required></textarea>
                    <button type="submit" class="btn btn-success" id="submitCheckout">ဆက်လုပ်ရန်</button>
                </form>
            </div>
            <div id="paymentInfo" class="hidden">
                <h3>💳 ငွေလွဲရန်</h3>
                <p id="paymentNumberDisplay"><strong>Wave Pay - 09 781 145 573</strong></p>
                <div class="order-status">
                    <p>⏳ ကျန်အချိန်: <span class="timer" id="orderTimer">60:00</span></p>
                    <input type="file" id="screenshotInput" accept="image/*" />
                    <button class="btn btn-primary" id="uploadScreenshotBtn">📤 Screenshot ပို့မည်</button>
                    <div id="orderStatusMsg" style="margin-top:0.5rem; font-weight:600;"></div>
                </div>
                <button class="btn btn-outline" id="cancelOrderBtn">ပယ်ဖျက်မည်</button>
            </div>
        </div>
    </div>

    <!-- ===== USER MODAL (Legacy Profile) ===== -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <h2 id="userModalTitle">👤 Profile</h2>
            <div id="userFormContainer">
                <div style="text-align:center; margin-bottom:1rem;">
                    <img id="profilePicPreview" src="" alt="Profile" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid #e11b1b; display:none;" />
                    <div id="profilePicPlaceholder" style="width:80px; height:80px; border-radius:50%; background:#f0f0f0; display:flex; align-items:center; justify-content:center; margin:0 auto; font-size:2rem; border:2px solid #ddd;">👤</div>
                    <input type="file" id="profilePicInput" accept="image/*" style="margin-top:0.5rem;" />
                    <button class="btn btn-outline" id="uploadProfilePicBtn" style="font-size:0.7rem; padding:0.2rem 0.8rem;">ပုံတင်မည်</button>
                </div>
                <label>Username</label>
                <input type="text" id="loginUsername" />
                <label>Password</label>
                <input type="password" id="loginPassword" />
                <div style="display:flex; gap:0.5rem; margin-top:0.8rem; flex-wrap:wrap;">
                    <button class="btn btn-primary" id="loginBtn">Login</button>
                    <button class="btn btn-success" id="registerBtn">Register</button>
                    <button class="btn btn-outline" id="forgotPwdBtn">Forgot Password</button>
                    <button class="btn btn-outline" id="logoutBtn" style="display:none;">Logout</button>
                    <button class="btn btn-outline" id="closeUserBtn">ပိတ်ရန်</button>
                </div>
                <div id="userStatus" style="margin-top:0.5rem;"></div>
            </div>
            <div id="userChatContainer" class="hidden">
                <h3 id="userChatTitle">💬 Messages</h3>
                <div id="chatUserList"></div>
                <div id="chatMessages"></div>
                <div style="display:flex; gap:0.3rem;">
                    <input type="text" id="chatRecipient" placeholder="To" style="flex:1; padding:0.3rem; border:1px solid #ddd; border-radius:6px;" />
                    <input type="text" id="chatMessageInput" placeholder="Message" style="flex:2; padding:0.3rem; border:1px solid #ddd; border-radius:6px;" />
                    <button class="btn btn-primary" id="chatSendBtn" style="font-size:0.7rem; padding:0.2rem 0.6rem;">Send</button>
                </div>
                <button class="btn btn-outline" id="chatBackBtn" style="margin-top:0.3rem;">Back</button>
            </div>
        </div>
    </div>

    <!-- ===== REVIEW MODAL ===== -->
    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <h2 id="reviewProductTitle">Product</h2>
            <div id="reviewProductInfo"></div>
            <div id="reviewProductImages" style="display:flex; flex-wrap:wrap; gap:0.5rem; margin:0.5rem 0;"></div>
            <div class="reviews-section">
                <h4>💬 Reviews</h4>
                <div id="commentsList"></div>
                <textarea id="newComment" placeholder="သင့်အမြင်ရေးပါ..." rows="2"></textarea>
                <button class="btn btn-primary" id="addCommentBtn" style="margin-top:0.3rem;">Comment</button>
            </div>
            <button class="btn btn-outline" id="closeReviewBtn" style="margin-top:0.8rem;">ပိတ်ရန်</button>
        </div>
    </div>

    <!-- ===== CHAT WIDGET ===== -->
    <button id="chatToggle">💬 <span class="badge" id="chatBadge">0</span></button>
    <div id="chatWidget">
        <div class="chat-header">
            <span id="chatHeaderTitle">💬 Support & Order Chat</span>
            <button id="closeChatBtn">✕</button>
        </div>
        <div class="chat-messages" id="chatMessagesWidget"></div>
        <div class="chat-input">
            <input type="text" id="chatInputWidget" placeholder="စာရိုက်ပါ..." />
            <button id="chatSendWidgetBtn">ပို့မည်</button>
        </div>
    </div>

    <!-- ===== BOTTOM NAVIGATION ===== -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-page="home" onclick="navigateTo('home')">
            <span class="icon">🏠</span>
            <span class="label">Home</span>
        </button>
        <button class="nav-item" data-page="messages" onclick="openChatWidget()">
            <span class="icon">💬</span>
            <span class="label">Messages</span>
            <span class="badge" id="navChatBadge" style="display:none;">0</span>
        </button>
        <button class="nav-item" data-page="cart" onclick="openCartModal()">
            <span class="icon">🛒</span>
            <span class="label">Cart</span>
            <span class="badge" id="navCartBadge">0</span>
        </button>
        <button class="nav-item" data-page="profile" onclick="navigateTo('profile')">
            <span class="icon">👤</span>
            <span class="label">Profile</span>
        </button>
    </nav>

    <script src="main.js"></script>
    <script src="user.js"></script>

</body>
</html>
