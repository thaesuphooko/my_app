<!DOCTYPE html>
<html lang="my" data-theme="light">
<head>
    <!-- Meta Tags များ - မြန်မာဘာသာ အပြည့်အဝထောက်ပံ့ -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#e11b1b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="description" content="Premium Myanmar E-Commerce SPA - အကောင်းဆုံးဈေးနှုန်းများ၊ မြန်မာနိုင်ငံအနှံ့ ပို့ဆောင်ပေးသည်">
    <meta name="keywords" content="Myanmar, Shopping, Online, Wave Pay, Ecommerce">
    
    <!-- Title - Admin မှပြောင်းလဲနိုင်သော -->
    <title>ShopNow Myanmar | Premium Online Shopping</title>

    <!-- Favicon & Web App Icons -->
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">

    <!-- Google Fonts - Primary: Inter / Display: Myanmar Unicode -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Myanmar:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome 6 CDN - Icons များအတွက် -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Leaflet.js CSS - မြေပုံအတွက် -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Papa Parse - CSV ဖိုင်တွက်ချက်ရန် -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Firebase SDKs (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <!-- Custom CSS (Style System) -->
    <link rel="stylesheet" href="style.css">

    <!-- Firebase Config & Init (သီးသန့်ဖိုင်) -->
    <script src="firebase-config.js" defer></script>
    
    <!-- Main App JavaScript (အဆင့်မြင့်စနစ်များ) -->
    <script src="main.js" type="module" defer></script>
    <script src="user.js" type="module" defer></script>
    <script src="admin.js" type="module" defer></script>

    <!-- 
      ==============================
      အရေးကြီး မှတ်ချက်-
      Hash-based Routing စနစ်ကို main.js တွင် အကောင်အထည်ဖော်ထားပါသည်။
      Page အားလုံး (#home, #profile, #orders, #tracking, #checkout, #product/{id}) 
      ကို main content area အတွင်း Dynamically render ပြုလုပ်ပါသည်။
    ============================== 
    -->
</head>
<body>
    <!-- 
      ==============================
      App Root Container - Glass Morphic Background
      Background Gradient: #fce4ec -> #f3e5f5
      ==============================
    -->
    <div id="app">
        <!-- 
          ==============================
          Header Section - Fixed Top
          - Brand Logo
          - Smart Clock
          - Dark Theme Toggle
          - Music Player
          ==============================
        -->
        <header id="main-header">
            <div class="header-inner container">
                <!-- Logo & Brand -->
                <div class="brand" onclick="window.location.hash='#home'">
                    <i class="fa-solid fa-bolt" style="color: var(--primary);"></i>
                    <span class="brand-text">ShopNow</span>
                    <span class="brand-sub">Myanmar</span>
                </div>

                <!-- Smart Clock - Real-time Device Time ဖြင့် စတင်၊ ၁မိနစ်အကြာ Slow Mode -->
                <div id="smart-clock" class="smart-clock">
                    <span id="clock-time">--:--:--</span>
                    <span id="clock-mode" class="clock-mode-badge">Live</span>
                </div>

                <!-- Header Right Group: Dark Toggle & Music -->
                <div class="header-actions">
                    <!-- Dark Theme Toggle Switch (LocalStorage ဖြင့် မှတ်သား) -->
                    <label class="theme-toggle" for="dark-mode-checkbox">
                        <i class="fa-solid fa-moon"></i>
                        <input type="checkbox" id="dark-mode-checkbox">
                        <span class="toggle-slider"></span>
                        <i class="fa-solid fa-sun"></i>
                    </label>

                    <!-- Music Player Button (Admin YouTube Playlist မှ 24/7 Auto Play) -->
                    <button id="music-toggle-btn" class="icon-btn" title="သီချင်းဖွင့်/ပိတ်">
                        <i class="fa-solid fa-music"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- 
          ==============================
          Main Content Area - Dynamic Page Rendering
          Hash Route အလိုက် Page များ ဤနေရာတွင် ပေါ်မည်။
          ==============================
        -->
        <main id="main-content" class="container">
            <!-- Default အနေဖြင့် #home page ကို Initial Render ပြုလုပ်ပါမည် (main.js မှ) -->
            <!-- Loading Skeleton ပြသမည် -->
            <div id="page-loader" class="page-loader">
                <div class="skeleton-card" style="width:100%; height:200px; border-radius:16px;"></div>
                <div class="skeleton-grid">
                    <div class="skeleton-card" style="height:250px;"></div>
                    <div class="skeleton-card" style="height:250px;"></div>
                    <div class="skeleton-card" style="height:250px;"></div>
                    <div class="skeleton-card" style="height:250px;"></div>
                </div>
            </div>
        </main>

        <!-- 
          ==============================
          Bottom Navigation Bar (Mobile Focus)
          Fixed Bottom တွင် အမြဲရှိနေမည်။
          ခလုတ် ၄ ခု - Home, Messages, Cart, Profile
          Active State ကို Route အလိုက် ပြသမည်။
          ==============================
        -->
        <nav id="bottom-nav" class="bottom-nav">
            <a href="#home" class="nav-item active" data-route="home">
                <i class="fa-solid fa-house"></i>
                <span>အိမ်</span>
            </a>
            <a href="#messages" class="nav-item" data-route="messages">
                <i class="fa-solid fa-comment-dots"></i>
                <span class="badge-wrapper">
                    <span>စာများ</span>
                    <span id="unread-badge" class="badge" style="display:none;">0</span>
                </span>
            </a>
            <a href="#cart" class="nav-item" data-route="cart">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="badge-wrapper">
                    <span>ခြင်း</span>
                    <span id="cart-badge" class="badge" style="display:none;">0</span>
                </span>
            </a>
            <a href="#profile" class="nav-item" data-route="profile">
                <i class="fa-solid fa-user"></i>
                <span>ကိုယ်ရေး</span>
            </a>
        </nav>

        <!-- 
          ==============================
          Floating Chat Widget (Icon)
          - ညာဘက်အောက်ခြေတွင် အမြဲပေါ်နေမည်။
          - #messages page ရောက်ပါက အလိုအလျောက် ပျောက်သွားမည် (JS ဖြင့်)
          ==============================
        -->
        <div id="floating-chat-widget" class="floating-chat-widget">
            <button id="chat-toggle-btn" class="chat-float-btn" title="Chat Support ဖွင့်ရန်">
                <i class="fa-solid fa-headset"></i>
                <span class="chat-pulse"></span>
            </button>
        </div>

        <!-- 
          ==============================
          Hidden iFrame for YouTube Music Player
          Admin မှ ထည့်သွင်းထားသော Playlist များကို 24/7 ဖွင့်ရန်
          ==============================
        -->
        <div id="music-player-container" style="display:none;">
            <div id="youtube-player"></div>
        </div>
    </div>

    <!-- 
      ==============================
      Leaflet.js Map Script (Defer)
      ==============================
    -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

    <!-- 
      ==============================
      မှတ်ချက် - 
      အထက်ပါဖွဲ့စည်းပုံသည် Pure HTML, CSS, JS (ES6+) ဖြင့် 
      အပြည့်အဝ တည်ဆောက်ထားသော Premium E-Commerce SPA ၏ 
      အခြေခံ HTML Layout ဖြစ်ပါသည်။
      အားလုံးသော CDN စာကြည့်တိုက်များ၊ Firebase SDK များနှင့် 
      Custom Script များကို မှန်ကန်စွာ ထည့်သွင်းထားပါသည်။
    ==============================
    -->
</body>
</html>
