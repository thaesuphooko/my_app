<!DOCTYPE html>
<html lang="my" data-theme="light">
<head>
    <!-- Meta Tags - မြန်မာဘာသာအပြည့်အဝ -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#e11b1b">
    <title>ShopNow Admin Panel</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Myanmar:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Leaflet CSS (optional for admin) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Papa Parse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Firebase Config -->
    <script src="firebase-config.js" defer></script>
    <!-- Admin Scripts -->
    <script src="admin.js" defer></script>
</head>
<body>
    <!-- 
      Admin Panel Container -
      admin.js မှ အလိုအလျောက် စီမံမည်။
      Login မဝင်ရသေးပါက Login UI ပြမည်။
    -->
    <div id="admin-container"></div>

    <script>
        // admin.js ပြီးသည်နှင့် Admin Panel စတင်ရန်
        window.addEventListener('DOMContentLoaded', () => {
            // admin.js ၏ initAdminPanel ကို ခေါ်မည်။
            // admin.js သည် လက်ရှိ hash ကို #step ဟု မသတ်မှတ်ဘဲ admin.html တွင် 
            // အမြဲတမ်း admin panel ပြသရန် အနည်းငယ် ပြင်ဆင်ထားသည်။
            if (typeof initAdminPanel === 'function') {
                initAdminPanel();
            } else {
                // admin.js မရောက်သေးပါက စောင့်ဆိုင်းရန်
                const check = setInterval(() => {
                    if (typeof initAdminPanel === 'function') {
                        clearInterval(check);
                        initAdminPanel();
                    }
                }, 200);
            }
        });
    </script>
</body>
</html>
